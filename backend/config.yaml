workspace:
  root_dir: D:\pyproject\DynamicGraphMixer-main\history_model_version
  ignore_patterns:
  - .git/*
  - node_modules/*
  - __pycache__/*
  - '*.tmp'
  - '*.log'
  max_file_size_mb: 10
  max_files_per_run: 500
llm:
  provider: openai_compat
  endpoint: https://api.siliconflow.cn/v1
  model: Pro/moonshotai/Kimi-K2.5
  api_key_env: SILICONFLOW_API_KEY
  timeout_seconds: 30
  max_context_tokens: 12000
output:
  storage_dir: outputs
  export_markdown: true
  export_json: true
ui:
  mode: desktop
